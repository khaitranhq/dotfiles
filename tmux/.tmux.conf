# ==============================================================================
# TERMINAL SETTINGS
# ==============================================================================

set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g visual-activity off

# ==============================================================================
# PREFIX KEY
# ==============================================================================

# Use Ctrl-Space (more ergonomic than default Ctrl-B)
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# ==============================================================================
# CONFIGURATION MANAGEMENT
# ==============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# File picker
bind C-f display-popup -E "pick_files"

# ==============================================================================
# PANE SPLITTING
# ==============================================================================

# Intuitive split bindings: | for vertical line, - for horizontal line
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alternative bindings for compatibility
bind '"' split-window -c "#{pane_current_path}"
bind / split-window -h -c "#{pane_current_path}"

# ==============================================================================
# PANE NAVIGATION
# ==============================================================================

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==============================================================================
# PANE RESIZING
# ==============================================================================

# Vim-style resizing with repeat (-r allows key repeat without prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fine-grained resizing with Alt (no prefix required)
bind -n M-h resize-pane -L 1
bind -n M-j resize-pane -D 1
bind -n M-k resize-pane -U 1
bind -n M-l resize-pane -R 1

# ==============================================================================
# WINDOW MANAGEMENT
# ==============================================================================

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind -r p previous-window
bind -r n next-window

# Swap windows while following them
bind P run-shell 'tmux swap-window -t -1 && tmux previous-window'
bind N run-shell 'tmux swap-window -t +1 && tmux next-window'

# Quick window selection with Alt+number (no prefix required)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ==============================================================================
# COPY MODE
# ==============================================================================

setw -g mode-keys vi

# Enter copy mode
bind v copy-mode

# Vim-style selection and copying
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ==============================================================================
# SESSION MANAGEMENT
# ==============================================================================

bind s choose-session
bind q confirm-before "kill-session"

# ==============================================================================
# MOUSE SUPPORT
# ==============================================================================

set -g mouse on

# ==============================================================================
# DISPLAY & BEHAVIOR
# ==============================================================================

set -s set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# ==============================================================================
# STATUS BAR THEME
# ==============================================================================

set -g status-left-length 100
set -g status-style "fg=#7aa2f7,bg=#16161e"
set -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"
set -g status-right ""
set -g mode-style "fg=#7aa2f7,bg=#3b4261"

# Window status styling
setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#16161e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#16161e"
setw -g window-status-format "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#16161e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]"

# Pane border styling
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message styling
set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"
