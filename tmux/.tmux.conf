# ==============================================================================
# Tmux quick reference:
#
# Bind keys:
#  - `bind <key> <command>`: Bind a key to a command (requires prefix)
#  - `bind -n <key> <command>`: Bind a key to a command without prefix
#  - `bind -r <key> <command>`: Bind a key to a command with repeat (hold key)
# ==============================================================================

# ==============================================================================
# TERMINAL SETTINGS
# ==============================================================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g visual-activity off
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on

# ==============================================================================
# PREFIX KEY
# ==============================================================================

# Use Ctrl-Space (more ergonomic than default Ctrl-B)
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# ==============================================================================
# CONFIGURATION MANAGEMENT
# ==============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# File picker - pick_files sends selected paths back to original pane
bind C-f display-popup -w 75% -h 80% -E "zsh -fic 'source ~/.config/zsh/functions/tmux.zsh && pick_files'"

# ==============================================================================
# PANE MANAGEMENT
# ==============================================================================

# Intuitive split bindings: | for vertical line, - for horizontal line
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Alternative bindings for compatibility
bind '"' split-window -c "#{pane_current_path}"
bind / split-window -h -c "#{pane_current_path}"

bind x kill-pane

# ==============================================================================
# PANE NAVIGATION
# ==============================================================================

# Vim-style navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ==============================================================================
# WINDOW MANAGEMENT
# ==============================================================================

# Disable default prefix+c (new-window) — use prefix+n instead
unbind-key c

# New window inherits current path
bind n new-window -c "#{pane_current_path}"

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Swap windows while following them
bind [ run-shell 'tmux swap-window -t -1 && tmux previous-window'
bind ] run-shell 'tmux swap-window -t +1 && tmux next-window'

# ==============================================================================
# COPY MODE
# ==============================================================================

setw -g mode-keys vi

# Enter copy mode
bind v copy-mode

# Vim-style selection and copying
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ==============================================================================
# SESSION MANAGEMENT
# ==============================================================================

bind s choose-session
bind q confirm-before "kill-session"

# ==============================================================================
# MOUSE SUPPORT
# ==============================================================================

set -g mouse on

# ==============================================================================
# DISPLAY & BEHAVIOR
# ==============================================================================

set -s set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# ==============================================================================
# STATUS BAR THEME
# ==============================================================================
set -g status-position top
set -g status-left-length 100
set -g status-style "fg=#7fbbb3,bg=#333c43"
set -g status-left "#[fg=#333c43,bg=#7fbbb3,bold] #S #[fg=#7fbbb3,bg=#333c43,nobold,nounderscore,noitalics]"
set -g status-right ""
set -g mode-style "fg=#7fbbb3,bg=#434f55"

# Window status styling
setw -g window-status-activity-style "underscore,fg=#d3c6aa,bg=#333c43"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#d3c6aa,bg=#333c43"
setw -g window-status-format "#[fg=#333c43,bg=#333c43,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#333c43,bg=#333c43,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#333c43,bg=#434f55,nobold,nounderscore,noitalics]#[fg=#7fbbb3,bg=#434f55,bold] #I  #W #F #[fg=#434f55,bg=#333c43,nobold,nounderscore,noitalics]"

# Pane border styling
set -g pane-border-style "fg=#434f55"
set -g pane-active-border-style "fg=#7fbbb3"

# Message styling
set -g message-style "fg=#7fbbb3,bg=#434f55"
set -g message-command-style "fg=#7fbbb3,bg=#434f55"
