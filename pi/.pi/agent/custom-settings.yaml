mcp:
  servers:
    - name: obsidian
      transport: http
      url: http://127.0.0.1:27123/mcp/
      headers:
        Authorization: Bearer ${OBSIDIAN_MCP_TOKEN}
tools:
  bash:
    find: allow
    ls: allow
    grep: allow
    cat: allow
    wc: allow
    fd: allow
    cd: allow
    pwd: allow
    rg: allow
    mkdir: allow
    which: allow
    readlink: allow
    diff: allow
    stat: allow
    head: allow
    tail: allow
    echo: allow
    sort: allow
    file: allow
    strings: allow
    command: allow
    sed: allow
    "true": allow
    nl: allow
    xargs: allow
    jq: allow
    d2: allow
    yq: allow
    yamllint: allow
    gh run: allow
    go env: allow
    go version: allow
    go doc: allow
    go test: allow
    go vet: allow
    go build: allow
    go list: allow
    gofmt: allow
    gofumpt: allow
    goimports: allow
    golines: allow
    golangci-lint: allow
    git diff: allow
    git status: allow
    git log: allow
    git branch: allow
    git show: allow
    git rev-parse: allow
    git config: allow
    git remote: allow
    git fetch: allow
    git pull: allow
    npx tsc: allow
    npx vitest: allow
    npx oxlint: allow
    npx oxfmt: allow
    npm search: allow
    actionlint: allow
    zizmor: allow
    oxfmt: allow
    printf: allow
    awk: allow
    oxlint: allow
    uniq: allow
    cp: allow
    pnpm lint: allow
    pnpm test: allow
    gh pr diff: allow
  read: allow
  write: allow
  edit: allow
  subagent: allow
  question: allow
  web_search: allow
  web_fetch: allow
  todowrite: allow
  atlassian_*: deny
  obsidian_*: allow
  mcp: allow
agents:
  atlassian:
    mode: subagent
    description: Atlassian specialist for Jira issue and Confluence page operations via MCP
    tools:
      mcp_atlassian_*: allow
    prompt: ${file:agents/atlassian.md}
  code-reviewer:
    mode: subagent
    description: Senior code reviewer for quality, security, and maintainability
    tools:
      - read
      - grep
      - find
      - ls
      - bash
    prompt: ${file:agents/code-reviewer.md}
  scout:
    mode: subagent
    description: Fast codebase recon returning structured context for other agents
    tools:
      - read
      - rg
      - grep
      - find
      - ls
      - bash
    prompt: ${file:agents/scout.md}
