    yamllint: allow
    gh run: allow
    go env: allow
    go version: allow
    go doc: allow
    go test: allow
    go vet: allow
    go build: allow
    go list: allow
    gofmt: allow
    gofumpt: allow
    goimports: allow
    golines: allow
    golangci-lint: allow
    git diff: allow
