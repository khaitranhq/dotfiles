mcp:
  servers:
    # - name: atlassian
    #   transport: http
    #   url: https://mcp.atlassian.com/v1/mcp/authv2
    - name: obsidian
      transport: http
      url: http://127.0.0.1:27123/mcp/
      headers:
        Authorization: Bearer ${OBSIDIAN_MCP_TOKEN}
tools:
  bash:
    find: allow
    ls: allow
    grep: allow
    cat: allow
    wc: allow
    fd: allow
    cd: allow
    pwd: allow
    rg: allow
    mkdir: allow
    which: allow
    readlink: allow
    diff: allow
    stat: allow
    head: allow
    tail: allow
    echo: allow
    sort: allow
    file: allow
    strings: allow
    command: allow
    sed: allow
    "true": allow
    nl: allow
    xargs: allow
    jq: allow
    d2: allow
    yq: allow
    yamllint: allow
    gh run: allow
    go env: allow
    go version: allow
    go doc: allow
    go test: allow
    go vet: allow
    go build: allow
    go list: allow
    gofmt: allow
    gofumpt: allow
    goimports: allow
    golines: allow
    golangci-lint: allow
    git diff: allow
    git status: allow
    git log: allow
    git branch: allow
    git show: allow
    git rev-parse: allow
    git config: allow
    git remote: allow
    git fetch: allow
    git pull: allow
    npx tsc: allow
    npx vitest: allow
    npx oxlint: allow
    npx oxfmt: allow
    npm search: allow
    actionlint: allow
    zizmor: allow
    oxfmt: allow
    printf: allow
    awk: allow
    oxlint: allow
    uniq: allow
    cp: allow
  read: allow
  write: allow
  edit: allow
  subagent: allow
  question: allow
  web_search: allow
  web_fetch: allow
  todowrite: allow
  mcp_atlassian_*: deny
  mcp_obsidian_*: allow
  mcp: allow

# ── Agent definitions ────────────────────────────────────────────────
# Replaces individual agent markdown files in ~/.pi/agent/agents/.
# Prompts support ${file:/path/to/prompt.md} references.

agents:
  architect-orchestrator:
    mode: primary
    description: Orchestrates complex multi-agent workflows for architecture and design
    model: claude-sonnet-4-5
    prompt: "${file:agents/architect-orchestrator.md}"

  development-coordinator:
    mode: primary
    description: Coordinates development workflows across subagents for implementation tasks
    model: claude-sonnet-4-5
    prompt: "${file:agents/development-coordinator.md}"

  atlassian:
    mode: subagent
    description: Atlassian specialist for Jira issue and Confluence page operations via MCP
    model: claude-sonnet-4-5
    tools:
      read: allow
      bash: allow
      write: allow
      edit: allow
      web_search: allow
      web_fetch: allow
      question: allow
      todowrite: allow
      mcp: allow
      mcp_atlassian_*: allow
    prompt: "${file:agents/atlassian.md}"

  code-reviewer:
    mode: subagent
    description: Senior code reviewer for quality, security, and maintainability
    model: claude-sonnet-4-5
    tools:
      - read
      - grep
      - find
      - ls
      - bash
    prompt: "${file:agents/code-reviewer.md}"

  coder:
    mode: subagent
    description: General-purpose coding subagent with full tool capabilities
    model: claude-sonnet-4-5
    tools:
      - read
      - bash
      - write
      - edit
      - grep
      - find
      - ls
    prompt: "${file:agents/coder.md}"

  planner:
    mode: subagent
    description: Creates implementation plans from context and requirements
    model: claude-sonnet-4-5
    tools:
      - read
      - grep
      - find
      - ls
    prompt: "${file:agents/planner.md}"

  scout:
    mode: subagent
    description: Fast codebase recon returning structured context for other agents
    model: claude-haiku-4-5
    tools:
      - read
      - rg
      - grep
      - find
      - ls
      - bash
    prompt: "${file:agents/scout.md}"
