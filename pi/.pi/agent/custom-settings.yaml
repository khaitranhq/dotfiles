agents:
  code-reviewer:
    mode: subagent
    description: Senior code reviewer for quality, security, and maintainability
    prompt: ${file:agents/code-reviewer.md}
  developer:
    mode: subagent
    description: Senior developer for implementing code, refactoring, and writing
      tests. Use when task is implementation-focused.
    prompt: ${file:agents/developer.md}
  staff-engineer:
    mode: primary
    description: Staff engineer for complex multi-step implementations — explores,
      designs 3 approaches, plans, implements via TDD, review-loops against
      code-reviewer, and documents. Use when task is complex, multi-file,
      architectural, or user wants thoroughness.
    prompt: ${file:agents/staff-engineer.md}
