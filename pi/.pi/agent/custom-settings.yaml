mcp:
  servers:
    - name: "jira"
      transport: "http"
      url: "https://jira.example.com/mcp"
always_approve:
  bashCommands:
    - find
    - ls
    - grep
    - cat
    - npx tsc
    - wc
    - fd
    - cd
    - pwd
    - rg
    - mkdir
    - which
    - readlink
    - go env
    - go version
    - golines
    - gofumpt
    - golangci-lint
    - gofmt
    - go test
    - go vet
    - go build
    - go list
    - git diff
    - git status
    - git log
    - git branch
    - git show
    - git rev-parse
    - git config
    - git remote
    - git fetch
    - git pull
    - diff
    - stat
    - head
    - d2
    - go doc
    - echo
    - sort
    - file
    - strings
    - command
    - goimports
    - gofumpt
    - golines
    - golangci-lint
    - yamllint
    - yq
    - tail
    - actionlint
    - zizmor
    - npx vitest
    - oxfmt
    - npm search
    - npx oxlint
    - sed
    - "true"
    - nl
    - gh run
    - xargs
    - jq
  tools:
    - read
    - write
    - edit
    - subagent
    - question
    - mcp_jira_getaccessibleatlassianresources
    - mcp_jira_getjiraissue
    - web_search
    - web_fetch
tools:
  agents:
    atlassian:
      allow:
        - read
        - bash
        - web_search
        - web_fetch
        - question
        - mcp_jira_atlassianuserinfo
        - mcp_jira_getaccessibleatlassianresources
        - mcp_jira_getconfluencepage
