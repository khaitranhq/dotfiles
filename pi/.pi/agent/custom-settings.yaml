mcp:
  servers:
    - name: atlassian
      transport: http
      url: https://mcp.atlassian.com/v1/mcp/authv2
always_approve:
  bashCommands:
    - find
    - ls
    - grep
    - cat
    - npx tsc
    - wc
    - fd
    - cd
    - pwd
    - rg
    - mkdir
    - which
    - readlink
    - go env
    - go version
    - golines
    - gofumpt
    - golangci-lint
    - gofmt
    - go test
    - go vet
    - go build
    - go list
    - git diff
    - git status
    - git log
    - git branch
    - git show
    - git rev-parse
    - git config
    - git remote
    - git fetch
    - git pull
    - diff
    - stat
    - head
    - d2
    - go doc
    - echo
    - sort
    - file
    - strings
    - command
    - goimports
    - gofumpt
    - golines
    - golangci-lint
    - yamllint
    - yq
    - tail
    - actionlint
    - zizmor
    - npx vitest
    - oxfmt
    - npm search
    - npx oxlint
    - sed
    - "true"
    - nl
    - gh run
    - xargs
    - jq
  tools:
    - read
    - write
    - edit
    - subagent
    - question
    - mcp_jira_getaccessibleatlassianresources
    - mcp_jira_getjiraissue
    - web_search
    - web_fetch
    - todowrite
    - mcp_codegraph_codegraph_search
    - mcp_codegraph_codegraph_files
    - mcp_codegraph_codegraph_node
    - mcp_codegraph_codegraph_status
tools:
  agents:
    atlassian:
      allow:
        - read
        - bash
        - web_search
        - web_fetch
        - question
