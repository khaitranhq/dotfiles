        - mcp_jira_getconfluencepagefootercomments
        - mcp_jira_getconfluencepageinlinecomments
        - mcp_jira_getconfluencecommentchildren
        - mcp_jira_getconfluencepagedescendants
        - mcp_jira_createconfluencepage
        - mcp_jira_updateconfluencepage
        - mcp_jira_createconfluencefootercomment
        - mcp_jira_createconfluenceinlinecomment
        - mcp_jira_getjiraissue
        - mcp_jira_editjiraissue
        - mcp_jira_createjiraissue
        - mcp_jira_gettransitionsforjiraissue
        - mcp_jira_getjiraissueremoteissuelinks
