colourful: true
filekinds:
  normal: {foreground: "#abb2bf"}  # fg (main text)
  directory: {foreground: "#61afef"}  # blue (directories)
  symlink: {foreground: "#2bbac5"}  # cyan (symlinks)
  pipe: {foreground: "#5c6370"}  # gray (pipes)
  block_device: {foreground: "#ef596f"}  # red (block devices)
  char_device: {foreground: "#ef596f"}  # red (char devices)
  socket: {foreground: "#7f848e"}  # comment (sockets)
  special: {foreground: "#d55fde"}  # purple (special files)
  executable: {foreground: "#89ca78"}  # green (executables)
  mount_point: {foreground: "#d19a66"}  # orange (mount points)
perms:
  user_read: {foreground: "#abb2bf"}  # fg (user read)
  user_write: {foreground: "#e5c07b"}  # yellow (user write)
  user_execute_file: {foreground: "#89ca78"}  # green (user execute file)
  user_execute_other: {foreground: "#89ca78"}  # green (user execute other)
  group_read: {foreground: "#abb2bf"}  # fg (group read)
  group_write: {foreground: "#e5c07b"}  # yellow (group write)
  group_execute: {foreground: "#89ca78"}  # green (group execute)
  other_read: {foreground: "#7f848e"}  # comment (other read)
  other_write: {foreground: "#e5c07b"}  # yellow (other write)
  other_execute: {foreground: "#89ca78"}  # green (other execute)
  special_user_file: {foreground: "#d55fde"}  # purple (special user file)
  special_other: {foreground: "#5c6370"}  # gray (special other)
  attribute: {foreground: "#7f848e"}  # comment (attributes)
size:
  major: {foreground: "#7f848e"}  # comment (major)
  minor: {foreground: "#2bbac5"}  # cyan (minor)
  number_byte: {foreground: "#abb2bf"}  # fg (byte numbers)
  number_kilo: {foreground: "#abb2bf"}  # fg (kilo numbers)
  number_mega: {foreground: "#61afef"}  # blue (mega numbers)
  number_giga: {foreground: "#d55fde"}  # purple (giga numbers)
  number_huge: {foreground: "#ef596f"}  # red (huge numbers)
  unit_byte: {foreground: "#7f848e"}  # comment (byte units)
  unit_kilo: {foreground: "#61afef"}  # blue (kilo units)
  unit_mega: {foreground: "#d55fde"}  # purple (mega units)
  unit_giga: {foreground: "#d55fde"}  # purple (giga units)
  unit_huge: {foreground: "#d19a66"}  # orange (huge units)
users:
  user_you: {foreground: "#abb2bf"}  # fg (your user)
  user_root: {foreground: "#ef596f"}  # red (root user)
  user_other: {foreground: "#d55fde"}  # purple (other users)
  group_yours: {foreground: "#abb2bf"}  # fg (your group)
  group_other: {foreground: "#5c6370"}  # gray (other groups)
  group_root: {foreground: "#ef596f"}  # red (root group)
links:
  normal: {foreground: "#2bbac5"}  # cyan (normal links)
  multi_link_file: {foreground: "#d19a66"}  # orange (multi-link files)
git:
  new: {foreground: "#89ca78"}  # green (new/added files)
  modified: {foreground: "#e5c07b"}  # yellow (modified files)
  deleted: {foreground: "#ef596f"}  # red (deleted files)
  renamed: {foreground: "#2bbac5"}  # cyan (renamed files)
  typechange: {foreground: "#d55fde"}  # purple (type changed)
  ignored: {foreground: "#5c6370"}  # gray (ignored files)
  conflicted: {foreground: "#ef596f"}  # red (conflicted files)
git_repo:
  branch_main: {foreground: "#abb2bf"}  # fg (main branch)
  branch_other: {foreground: "#d55fde"}  # purple (other branches)
  git_clean: {foreground: "#89ca78"}  # green (clean repo)
  git_dirty: {foreground: "#ef596f"}  # red (dirty repo)
security_context:
  colon: {foreground: "#5c6370"}  # gray (colons)
  user: {foreground: "#abb2bf"}  # fg (user context)
  role: {foreground: "#d55fde"}  # purple (role)
  typ: {foreground: "#7f848e"}  # comment (type)
  range: {foreground: "#d55fde"}  # purple (range)
file_type:
  image: {foreground: "#e5c07b"}  # yellow (images)
  video: {foreground: "#ef596f"}  # red (videos)
  music: {foreground: "#89ca78"}  # green (music)
  lossless: {foreground: "#2bbac5"}  # cyan (lossless audio)
  crypto: {foreground: "#5c6370"}  # gray (crypto files)
  document: {foreground: "#abb2bf"}  # fg (documents)
  compressed: {foreground: "#d55fde"}  # purple (compressed)
  temp: {foreground: "#ef596f"}  # red (temp files)
  compiled: {foreground: "#61afef"}  # blue (compiled)
  build: {foreground: "#5c6370"}  # gray (build files)
  source: {foreground: "#61afef"}  # blue (source code)
punctuation: {foreground: "#5c6370"}  # gray (punctuation)
date: {foreground: "#e5c07b"}  # yellow (dates)
inode: {foreground: "#7f848e"}  # comment (inodes)
blocks: {foreground: "#5c6370"}  # gray (blocks)
header: {foreground: "#abb2bf"}  # fg (headers)
octal: {foreground: "#2bbac5"}  # cyan (octal)
flags: {foreground: "#d55fde"}  # purple (flags)
symlink_path: {foreground: "#2bbac5"}  # cyan (symlink paths)
control_char: {foreground: "#61afef"}  # blue (control chars)
broken_symlink: {foreground: "#ef596f"}  # red (broken symlinks)
broken_path_overlay: {foreground: "#5c6370"}  # gray (broken path overlay)