gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#e69875"
      - "bold"
    inactiveBorderColor:
      - "#83c092"
    searchingActiveBorderColor:
      - "#e69875"
      - "bold"
    optionsTextColor:
      - "#7fbbb3"
    selectedLineBgColor:
      - "#434f55"
    cherryPickedCommitFgColor:
      - "#7fbbb3"
    cherryPickedCommitBgColor:
      - "#d699b6"
    markedBaseCommitFgColor:
      - "#7fbbb3"
    markedBaseCommitBgColor:
      - "#dbbc7f"
    unstagedChangesColor:
      - "#e67e80"
    defaultFgColor:
      - "#d3c6aa"
git:
  autoFetch: false
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
promptToReturnFromSubprocess: false
customCommands:
  - key: "<c-a>" # Keybinding (Ctrl + a)
    description: "AI Commit"
    command: "source ~/.zshrc && ai_commit"
    context: "global"
    output: terminal
