gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - '#61afef'  # onedark_vivid blue
      - bold
    inactiveBorderColor:
      - '#5c6370'  # onedark_vivid gray
    optionsTextColor:
      - '#61afef'  # onedark_vivid blue
    selectedLineBgColor:
      - '#3a404a'  # slightly lighter than bg for selection
    cherryPickedCommitBgColor:
      - '#495162'  # line_number color for consistency
    cherryPickedCommitFgColor:
      - '#2bbac5'  # onedark_vivid cyan
    unstagedChangesColor:
      - '#ef596f'  # onedark_vivid red
    defaultFgColor:
      - '#abb2bf'  # onedark_vivid fg
    searchingActiveBorderColor:
      - '#e5c07b'  # onedark_vivid yellow
    # Additional onedark_vivid theme colors
    stagedChangesColor:
      - '#89ca78'  # onedark_vivid green
    defaultBgColor:
      - '#282c34'  # onedark_vivid bg
git:
  autoFetch: false
  paging:
    colorArg: always
    pager: delta --dark --paging=never
customCommands:
  - key: '<c-a>'
    context: 'global'
    command: "oco --yes"


