**For Infrastructure Code Analysis (AST-Grep Tools)**:

When searching for Pulumi code patterns, resource definitions, or infrastructure structures, **default to using ast-grep tools**:

- **Use `ast-grep__find_code`**: To find Pulumi resource declarations, component patterns, or specific infrastructure constructs
- **Use `ast-grep__find_code_by_rule`**: For complex searches like finding resources with specific configurations or dependency relationships
- **Use `ast-grep__dump_syntax_tree`**: To understand the AST structure of Pulumi code when crafting search patterns
- **Use `ast-grep__test_match_code_rule`**: To validate search patterns before applying them across the codebase

**When to use ast-grep over text search or grep**:
- Finding resource declarations (aws.s3.Bucket, azure.storage.Account, etc.)
- Locating component resource patterns and their configurations
- Analyzing infrastructure dependencies and relationships
