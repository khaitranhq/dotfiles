format = """
$fill\
$line_break\
$directory\
$cmd_duration\
$nodejs\
$git_branch\
$git_state\
$git_status\
$line_break\
$character"""

right_format = """$time"""

add_newline = false
palette = "everforest"

[fill]
symbol = "─"
style = "fg:grey0"

[directory]
style = "fg:orange"
read_only_style = "fg:orange"
truncation_length = 3
truncation_symbol = "…/"
format = "[ $path]($style)[$read_only]($read_only_style) "

[cmd_duration]
min_time = 2000
show_milliseconds = false
format = "took [$duration]($style) "
style = "fg:yellow"


[nodejs]
style = "fg:green"
symbol = " "
format = "[$symbol$version]($style) "

[git_branch]
style = "fg:green"
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "


[git_status]
style = "fg:yellow"
format = '([$all_status$ahead_behind]($style)) '
conflicted = '⚠️${count} '
ahead = '⬆️${count} '
behind = '⬇️${count} '
diverged = '↕️${ahead_count}⇣${behind_count} '
up_to_date = ''
untracked = '❓${count} '
stashed = '📦${count} '
modified = '✏️${count} '
staged = '➕${count} '
renamed = '➡️${count} '
deleted = '❌${count} '

[character]
success_symbol = '[→](bold green)'
error_symbol = '[→](bold red)'

[time]
disabled = false
time_format = '%T'
utc_time_offset = '+7'

[palettes.everforest]
bg_dim = "#232a2e"
bg0 = "#2d353b"
bg1 = "#343f44"
bg2 = "#3d484d"
bg3 = "#475258"
bg4 = "#4f585e"
bg5 = "#56635f"
bg_visual = "#543a48"
bg_red = "#514045"
bg_green = "#425047"
bg_blue = "#3a515d"
bg_yellow = "#4d4c43"

fg = "#d3c6aa"
red = "#e67e80"

orange = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"
grey0 = "#7a8478"
grey1 = "#859289"
grey2 = "#9da9a0"
statusline1 = "#a7c080"
statusline2 = "#d3c6aa"
statusline3 = "#e67e80"
