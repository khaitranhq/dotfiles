version: '3'

vars:
  IMAGE_NAME: tree-sitter-parser-builder
  IMAGE_TAG: latest
  DEFAULT_REPO: https://github.com/tree-sitter/tree-sitter-go.git
  DEFAULT_REVISION: 2346a3ab1bb3857b48b29d779a1ef9799a248cd7
  DEFAULT_OUTPUT: ~/.local/share/nvim/site/go.so

tasks:
  build:
    desc: Build the Docker image
    cmds:
      - docker build -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} -f ./Dockerfile .
    sources:
      - Dockerfile
      - scripts.sh

  run:
    desc: Run container to build a tree-sitter parser
    vars:
      REPO: '{{.REPO | default .DEFAULT_REPO}}'
      REVISION: '{{.REVISION | default .DEFAULT_REVISION}}'
      OUTPUT: '{{.OUTPUT | default .DEFAULT_OUTPUT}}'
    cmds:
      - |
        OUTPUT_PATH=$(eval echo {{.OUTPUT}})
        mkdir -p "$(dirname "$OUTPUT_PATH")"
        docker run --rm \
          -v "$(dirname "$OUTPUT_PATH"):/output" \
          {{.IMAGE_NAME}}:{{.IMAGE_TAG}} \
          {{.REPO}} \
          {{.REVISION}} \
          "/output/$(basename "$OUTPUT_PATH")"
    preconditions:
      - sh: docker image inspect {{.IMAGE_NAME}}:{{.IMAGE_TAG}} > /dev/null 2>&1
        msg: "Docker image not found. Run 'task build' first."

  run:go:
    desc: Build Go parser (example with defaults)
    cmds:
      - task: run
        vars:
          REPO: https://github.com/tree-sitter/tree-sitter-go.git
          REVISION: 2346a3ab1bb3857b48b29d779a1ef9799a248cd7
          OUTPUT: ~/.local/share/nvim/site/go.so

  run:c:
    desc: Build C parser (example)
    cmds:
      - task: run
        vars:
          REPO: https://github.com/tree-sitter/tree-sitter-c.git
          REVISION: v0.20.0
          OUTPUT: ~/.local/share/nvim/site/c.so

  run:python:
    desc: Build Python parser (example)
    cmds:
      - task: run
        vars:
          REPO: https://github.com/tree-sitter/tree-sitter-python.git
          REVISION: main
          OUTPUT: ~/.local/share/nvim/site/python.so

  default:
    desc: Show available tasks
    cmds:
      - task --list
